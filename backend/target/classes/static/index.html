<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四人升级 - 拖拉机</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginPage" class="page">
        <div class="login-box">
            <h1>四人升级</h1>
            <p class="subtitle">拖拉机在线对战</p>
            <div class="input-group">
                <input type="text" id="nicknameInput" placeholder="请输入你的昵称" maxlength="10">
            </div>
            <button id="joinBtn" class="btn-primary">进入房间</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <div id="gamePage" class="page hidden">
        <div class="game-header">
            <div class="game-info">
                <span class="phase-badge" id="phaseBadge">等待中</span>
                <span class="trump-info" id="trumpInfo">主花色: -</span>
                <span class="level-info" id="levelInfo">等级: 2</span>
            </div>
            <button id="leaveBtn" class="btn-leave">退出</button>
        </div>

        <div class="game-table">
            <div class="player-slot player-top" id="player2">
                <div class="player-name" id="name2">等待加入...</div>
                <div class="player-cards-count" id="count2">-</div>
                <div class="played-cards" id="played2"></div>
            </div>

            <div class="player-slot player-left" id="player1">
                <div class="player-name" id="name1">等待加入...</div>
                <div class="player-cards-count" id="count1">-</div>
                <div class="played-cards" id="played1"></div>
            </div>

            <div class="player-slot player-right" id="player3">
                <div class="player-name" id="name3">等待加入...</div>
                <div class="player-cards-count" id="count3">-</div>
                <div class="played-cards" id="played3"></div>
            </div>

            <div class="player-slot player-bottom" id="player0">
                <div class="player-name" id="name0">等待加入...</div>
                <div class="player-cards-count" id="count0">-</div>
                <div class="played-cards" id="played0"></div>
            </div>

            <div class="table-center">
                <div class="round-info" id="roundInfo">第 0 轮</div>
                <div class="message-area" id="messageArea"></div>
            </div>
        </div>

        <div class="hand-area">
            <div class="hand-cards" id="handCards"></div>
            <div class="action-buttons">
                <button id="declareBtn" class="btn-action hidden">亮主</button>
                <button id="skipDeclareBtn" class="btn-action hidden">不亮</button>
                <button id="confirmBottomBtn" class="btn-action hidden">确认扣底</button>
                <button id="playBtn" class="btn-action hidden">出牌</button>
                <button id="passBtn" class="btn-action hidden">不出</button>
            </div>
        </div>

        <div id="declareModal" class="modal hidden">
            <div class="modal-content">
                <h3>选择亮主花色</h3>
                <div class="suit-selector">
                    <button class="suit-btn" data-suit="SPADE" style="color: black;">♠ 黑桃</button>
                    <button class="suit-btn" data-suit="HEART" style="color: #e74c3c;">♥ 红桃</button>
                    <button class="suit-btn" data-suit="CLUB" style="color: black;">♣ 梅花</button>
                    <button class="suit-btn" data-suit="DIAMOND" style="color: #e74c3c;">♦ 方块</button>
                </div>
                <button id="closeDeclareModal" class="btn-cancel">取消</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/v2.3.0/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
